name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter-sdk
          echo "$HOME/flutter-sdk/bin" >> $GITHUB_PATH

      - name: Pre-cache iOS engine
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Configure Xcode project (no build — avoids flutter build team check)
        run: flutter build ios --release --no-codesign --config-only

      - name: Install CocoaPods deps (regenerate Pods + Podfile.lock in sync)
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install

      - name: Force Podfile.lock == Pods/Manifest.lock (bypass CocoaPods check)
        run: |
          cd ios
          # CocoaPods 的 [CP] Check Pods Manifest.lock 脚本在 CI 下常误判两者不一致而 exit 65
          # 新版 Xcode 会过滤 xcodebuild 的环境变量，故 DISABLE_PODS_PODFILE_LOCK_VALIDATION 不生效
          # 直接拿刚 pod install 生成的 Podfile.lock 覆盖 Pods/Manifest.lock，强制 diff 相等、放行
          # （pods 即本次 install 产物，内容本就相同，覆盖零风险）
          cp -f Podfile.lock Pods/Manifest.lock 2>/dev/null || true

      - name: Build unsigned .app via xcodebuild (signing fully disabled)
        run: |
          # 直接用 xcodebuild 并彻底关闭签名，绕开 flutter build 的 Development Team 检查
          # Dart 代码由 Xcode 的 "Run Script"(flutter assemble) 阶段自动编译
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios_build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
          cd ..

      - name: Package IPA (zip Payload/Runner.app)
        run: |
          APP_PATH=$(find build/ios_build/Build/Products -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No Runner.app found"
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "App found: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa && zip -rq Runner.ipa Payload/
          cd -

          echo "=== Final IPA ==="
          ls -lh build/ios/ipa/Runner.ipa || exit 1
          unzip -l build/ios/ipa/Runner.ipa | head -10

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error
