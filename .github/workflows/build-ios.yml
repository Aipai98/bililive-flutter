name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter-sdk
          echo "$HOME/flutter-sdk/bin" >> $GITHUB_PATH

      - name: Pre-cache iOS engine
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Migrate to Swift Package Manager (drop CocoaPods)
        run: |
          cd ios
          rm -rf Pods Podfile Podfile.lock
          # 移除 Flutter xcconfig 里对 Pods 的 #include（否则编译找不到已删除的 Pods-Runner.xcconfig）
          sed -i '' '/Pods-Runner/d' Flutter/Debug.xcconfig
          sed -i '' '/Pods-Runner/d' Flutter/Release.xcconfig
          # 移除 xcworkspace 对 Pods.xcodeproj 的引用（Flutter 会用 SPM 重新生成）
          sed -i '' '/Pods.xcodeproj/d' Runner.xcworkspace/contents.xcworkspacedata

      - name: Configure Xcode project (SPM, no codesign/team)
        run: flutter build ios --release --no-codesign --config-only

      - name: Build unsigned .app via xcodebuild (signing fully disabled)
        run: |
          # 直接用 xcodebuild 并彻底关闭签名，绕开 flutter build 的 Development Team 检查
          # Dart 代码由 Xcode 的 "Run Script"(flutter assemble) 阶段自动编译
          # 已迁 SPM，无 [CP] Check Pods Manifest.lock 阶段、无需 pod 环境变量，彻底规避之前的全部坑
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios_build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
          cd ..

      - name: Package IPA (zip Payload/Runner.app)
        run: |
          APP_PATH=$(find build/ios_build/Build/Products -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No Runner.app found"
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "App found: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa && zip -rq Runner.ipa Payload/
          cd -

          echo "=== Final IPA ==="
          ls -lh build/ios/ipa/Runner.ipa || exit 1
          unzip -l build/ios/ipa/Runner.ipa | head -10

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error
