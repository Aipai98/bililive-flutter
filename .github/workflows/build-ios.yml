name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter-sdk
          echo "$HOME/flutter-sdk/bin" >> $GITHUB_PATH

      - name: Pre-cache iOS engine
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build & Package IPA (manual — xcodebuild export needs teamID)
        run: |
          # Step 1: Build archive (--no-codesign produces xcarchive but skips auto-export)
          flutter build ipa --no-codesign --release

          # Step 2: Verify archive exists
          echo "=== Archive ==="
          ls -lh build/ios/archive/*.xcarchive 2>/dev/null || { echo "NO ARCHIVE"; exit 1; }

          # Step 3: Manually package IPA from xcarchive
          # An .ipa is just a zip of Payload/*.app — no signing/teamID needed
          mkdir -p build/ios/ipa/Payload
          APP_PATH=$(find build/ios/archive/Runner.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            find build/ios/archive -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "App found: $APP_PATH"
          cp -R "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa && zip -rq Runner.ipa Payload/
          cd -

          # Step 4: Verify result
          echo "=== Final IPA ==="
          ls -lh build/ios/ipa/Runner.ipa || exit 1
          unzip -l build/ios/ipa/Runner.ipa | head -10

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error
