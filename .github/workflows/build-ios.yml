name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter-sdk
          echo "$HOME/flutter-sdk/bin" >> $GITHUB_PATH

      - name: Pre-cache iOS engine
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Build & Package IPA (manual — avoid codesign/team requirement)
        run: |
          # 用 `build ios --no-codesign` 只编译出 .app，不触发 export/签名（无需 Development Team）
          flutter build ios --release --no-codesign

          # 手动打包 IPA：.ipa 本质就是 Payload/*.app 的 zip
          mkdir -p build/ios/ipa/Payload
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No Runner.app found"
            find build/ios -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "App found: $APP_PATH"
          cp -R "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa && zip -rq Runner.ipa Payload/
          cd -

          echo "=== Final IPA ==="
          ls -lh build/ios/ipa/Runner.ipa || exit 1
          unzip -l build/ios/ipa/Runner.ipa | head -10

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error
