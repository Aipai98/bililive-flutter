name: Build iOS IPA

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter-sdk
          echo "$HOME/flutter-sdk/bin" >> $GITHUB_PATH

      - name: Pre-cache iOS engine
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build unsigned IPA
        run: |
          echo "=== Flutter version ==="
          flutter --version
          echo "=== Starting build ==="
          flutter build ipa --no-codesign --release --verbose 2>&1 | tail -50
          echo "=== BUILD EXIT CODE: $? ==="
          echo "=== Listing build/ios/ tree ==="
          find build/ios -type f 2>/dev/null | head -30 || echo "build/ios empty"
          echo "=== Any .ipa anywhere? ==="
          find / -name "*.ipa" -type f 2>/dev/null | head -5 || echo "none"

      - name: Upload anything from build/ios/
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: |
            build/ios/**/*.ipa
            build/ios/*.ipa
            build/ios/ipa/**
          if-no-files-found: warn
