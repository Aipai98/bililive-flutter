name: Build iOS IPA

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter-sdk
          echo "$HOME/flutter-sdk/bin" >> $GITHUB_PATH

      - name: Pre-cache iOS engine
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned IPA
        run: flutter build ipa --no-codesign --release

      - name: Find & expose IPA
        run: |
          echo "=== 查找 IPA ==="
          find . -name "*.ipa" -type f 2>/dev/null | while read f; do echo "FOUND: $f ($(du -h "$f" | cut -f1))"; done
          mkdir -p output
          cp -v $(find . -name "*.ipa" -type f 2>/dev/null | head -1) output/Runner.ipa 2>/dev/null || echo "NO IPA FOUND"
          ls -lh output/ 2>/dev/null || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: output/
          if-no-files-found: warn
