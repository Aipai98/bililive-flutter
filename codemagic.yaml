# Codemagic 配置：无需本地 Mac，云端 macOS 直接出 IPA
# 用法见 README「在 Codemagic 出 IPA（无需 Mac）」一节
workflows:
  ios-ipa-unsigned:
    name: iOS IPA (unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Build unsigned IPA
        script: flutter build ipa --no-codesign --release
      - name: Verify & expose IPA
        script: |
          echo "=== 查找 IPA 文件 ==="
          find . -name "*.ipa" -type f 2>/dev/null
          echo "=== 复制到根目录 ==="
          cp -v build/ios/ipa/*.ipa $CM_BUILD_DIR/Runner.ipa 2>/dev/null || echo "IPA 不在预期路径"
          ls -lh $CM_BUILD_DIR/Runner.ipa 2>/dev/null || echo "根目录无 IPA"
    artifacts:
      - build/ios/ipa/*.ipa
      - Runner.ipa
    publishing:
      email:
        recipients:
          - 1558791782@qq.com   # 改成你自己的邮箱，构建完成会收到下载链接；也可留空直接在 Codemagic 控制台下载
